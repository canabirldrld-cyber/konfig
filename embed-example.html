<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Пример подключения конфигуратора</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        font: 16px/1.5 Arial, Helvetica, sans-serif;
        background: #f3f3f3;
        color: #111111;
      }

      .wrap {
        max-width: 1280px;
        margin: 0 auto;
      }

      iframe {
        display: block;
        width: 100%;
        min-height: 1600px;
        border: 0;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <iframe
        src="https://USERNAME.github.io/REPOSITORY/"
        title="Конфигуратор лодки"
        loading="lazy"
      ></iframe>
    </div>
  </body>
</html>
